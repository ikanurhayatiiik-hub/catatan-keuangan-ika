<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuangan Harian</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #FDE2E4; /* pink pastel background */
}

h2 {
    text-align: center;
    color: #C2185B;
}

.card {
    background: #FFF5F7;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #F8BBD0;
}

button {
    background: #F8BBD0;
    color: #880E4F;
    border: none;
    font-weight: bold;
}

button:hover {
    background: #F48FB1;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #F8BBD0;
    padding: 8px;
    text-align: center;
}

th {
    background: #F8BBD0;
    color: #880E4F;
}
</style>
</head>

<body>

<h2>💖 Keuangan Harian Ika</h2>

<div class="card">
<h3>Tambah Transaksi</h3>

<input type="date" id="tanggal">

<select id="tipe">
<option value="Masuk">Pemasukan</option>
<option value="Keluar">Pengeluaran</option>
</select>

<input type="text" id="kategori" placeholder="Kategori">
<input type="number" id="jumlah" placeholder="Jumlah">
<input type="text" id="keterangan" placeholder="Keterangan">

<button onclick="tambahData()">Simpan</button>
</div>

<div class="card">
<h3>Ringkasan</h3>
<p>Total Pemasukan: Rp <span id="totalMasuk">0</span></p>
<p>Total Pengeluaran: Rp <span id="totalKeluar">0</span></p>
<p><b>Saldo: Rp <span id="saldo">0</span></b></p>
</div>

<div class="card">
<h3>Data Transaksi</h3>
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Tipe</th>
<th>Kategori</th>
<th>Jumlah</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody id="tabelData"></tbody>
</table>
</div>

<script>
let transaksi = JSON.parse(localStorage.getItem("transaksi")) || [];

function tambahData() {
    let tanggalInput = document.getElementById("tanggal").value;
    let tipe = document.getElementById("tipe").value;
    let kategori = document.getElementById("kategori").value;
    let jumlah = document.getElementById("jumlah").value;
    let keterangan = document.getElementById("keterangan").value;

    if (!jumlah) {
        alert("Jumlah harus diisi!");
        return;
    }

    let data = {
        tanggal: tanggalInput || new Date().toLocaleDateString(),
        tipe: tipe,
        kategori: kategori,
        jumlah: parseInt(jumlah),
        keterangan: keterangan
    };

    transaksi.push(data);
    localStorage.setItem("transaksi", JSON.stringify(transaksi));

    document.getElementById("kategori").value = "";
    document.getElementById("jumlah").value = "";
    document.getElementById("keterangan").value = "";

    tampilData();
}

function tampilData() {
    let tabel = document.getElementById("tabelData");
    tabel.innerHTML = "";

    let totalMasuk = 0;
    let totalKeluar = 0;

    transaksi.forEach(item => {
        let row = `
        <tr>
        <td>${item.tanggal}</td>
        <td>${item.tipe}</td>
        <td>${item.kategori}</td>
        <td>Rp ${item.jumlah.toLocaleString()}</td>
        <td>${item.keterangan}</td>
        </tr>
        `;
        tabel.innerHTML += row;

        if (item.tipe === "Masuk") {
            totalMasuk += item.jumlah;
        } else {
            totalKeluar += item.jumlah;
        }
    });

    document.getElementById("totalMasuk").innerText = totalMasuk.toLocaleString();
    document.getElementById("totalKeluar").innerText = totalKeluar.toLocaleString();
    document.getElementById("saldo").innerText = (totalMasuk - totalKeluar).toLocaleString();
}

tampilData();
</script>

</body>
</html>
